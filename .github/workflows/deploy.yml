name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'  # Only trigger on changes to the frontend directory
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --base-href=/${{ github.event.repository.name }}/

      - name: Fix SPA routing
        run: cp dist/task-management-dashboard/browser/index.html dist/task-management-dashboard/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist/task-management-dashboard/browser
          branch: gh-pages
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
