<div class="header d-flex justify-content-between align-items-center mb-5">
  <div>
    <!-- <h2 class="title">Analytics Dashboard</h2> -->
    <p class="subtitle">Gain insights into your project performance and team productivity</p>
  </div>

  <div>
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-select">
      <mat-select [value]="boardsService.activeBoard()?._id" (selectionChange)="onBoardChange($event.value)" placeholder="Board"
        hideSingleSelectionIndicator="true">
        @for (board of boardsService.boards(); track board._id) {
        <mat-option [value]="board._id">
          <span>{{ board.name }}</span>
        </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
</div>

<app-statistics-list></app-statistics-list>

<div class="divider"></div>

<!-- This Row will include a Bar Chart (Tasks by Status and Priority) and a Completion Rate section -->
<div class="row">
  <div class="bar-chart-container col">
    <div class="col-header d-flex justify-content-between align-items-center">
      <div class="col-title">Tasks by Status and Priority</div>
      <div class="col-hint">Per active board</div>
    </div>
    <!-- Bar Chart will be rendered here -->
    <app-tasks-bar-chart [statusChartData]="analyticsService.analytics().statusChartData" [totalTasks]="analyticsService.analytics().totalTasks"></app-tasks-bar-chart>
  </div>
  <div class="completion-rate-container col">
    <div class="col-title">Completion Rate</div>
    <!-- Completion Rate content will be rendered here -->

    <app-completion-rate [completionRateData]="analyticsService.analytics().completionRateData"></app-completion-rate>

  </div>
</div>

<!-- This row will include 3 columns: a Doughnut chart for priority Breakdown (tasks by priority), a section for Tasks per member, and a section for Recent Activity -->
<div class="row">
  <div class="doughnut-chart-container col">
    <div class="col-title">Priority Breakdown</div>
    <!-- Doughnut Chart will be rendered here -->
    <app-analytics-card-placeholder></app-analytics-card-placeholder>
  </div>
  <div class="tasks-per-member-container col">
    <div class="col-title">Tasks per Member</div>
    <!-- Tasks per member content will be rendered here -->
    <app-analytics-card-placeholder></app-analytics-card-placeholder>
  </div>
  <div class="recent-activity-container col">
    <div class="col-title">Recent Activity</div>
    <!-- Recent Activity content will be rendered here -->
    <app-analytics-card-placeholder></app-analytics-card-placeholder>
  </div>
</div>
