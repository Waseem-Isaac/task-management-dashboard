<h1 class="title">Create an account</h1>
<p class="subtitle">Get started today — it's free</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="fields" novalidate>
  <div class="field">
    <label class="label mb-1" for="name">Full Name</label>
    <mat-form-field appearance="outline" class="field full-width">
      <input matInput formControlName="name" placeholder="e.g. Jane Doe" autocomplete="name" />
      <mat-error>{{ getFieldError('name') }}</mat-error>
    </mat-form-field>
  </div>

  <div class="field">
    <label class="label mb-1" for="email">Email</label>
    <mat-form-field appearance="outline" class="full-width">
      <input matInput formControlName="email" type="email" placeholder="you@example.com" autocomplete="email" />
      <mat-error>{{ getFieldError('email') }}</mat-error>
    </mat-form-field>
  </div>

  <div class="field">
    <label class="label mb-1" for="password">Password</label>
    <mat-form-field appearance="outline" class="field full-width">
      <input matInput formControlName="password" [type]="showPassword() ? 'text' : 'password'"
        placeholder="Min. 6 characters" autocomplete="new-password" />
      <button mat-icon-button matSuffix type="button" (click)="showPassword.set(!showPassword())"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
        <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error>{{ getFieldError('password') }}</mat-error>
    </mat-form-field>
  </div>

  <button class="btn-secondary submit-btn" type="submit" [disabled]="isSubmitting()">
    @if (isSubmitting()) {
    <mat-spinner diameter="18" />
    Creating account...
    } @else {
    Create Account
    }
  </button>
</form>
