<div class="board">
  <div class="board-header">
    <div class="board-name">
      <!-- Board name & Inline text field to edit the board name into one element -->
       <mat-form-field subscriptSizing="dynamic" appearance="outline" class="board-name-field editable-text">
        <input matInput [value]="activeBoard()?.name" (blur)="updateBoardName(activeBoard()?._id, $event.target.value)" />
         <mat-icon matPrefix class="edit-icon">edit</mat-icon>  
      </mat-form-field>

      <!-- {{ activeBoard()?.name }} -->
    </div>

    <div class="board-actions d-flex align-items-center">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-select">
        <mat-select [value]="activeBoard()?._id" (selectionChange)="onBoardChange($event.value)" placeholder="Board">
          @for (board of boards(); track board._id) {
            <mat-option [value]="board._id">{{ board.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <button mat-icon-button (click)="openAddBoardDialog()"  class="btn-primary-icon">
        <mat-icon>add_circle</mat-icon>
      </button>
    </div>
  </div>

  <app-board-tasks />
</div>
