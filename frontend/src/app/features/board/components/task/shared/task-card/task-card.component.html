<div class="task-card" [ngClass]="{ overdue: isOverdue(task()) }" (click)="viewRequested.emit(task()._id)">
  <!-- 1. Priority badge + actions -->
  <div class="card-header d-flex align-items-center justify-content-between mb-2">
    <div class="d-flex align-items-center">
      <ng-content></ng-content>
      <span class="priority-badge priority-{{ task().priority }}">{{ task().priority }}</span>
    </div>

    <div class="actions d-flex align-items-center">
       <button class="btn action-btn md negative" mat-icon-button (click)="deleteRequested.emit(task()._id); $event.stopPropagation()" [matTooltip]="'Delete Task'">
          <mat-icon class="icon-size-0-9">remove</mat-icon>
      </button>
      
    </div>
  </div>

  <!-- 2. Title -->
  <h5 class="card-title mb-4">{{ task().title }}</h5>

  <!-- 3. Description -->
  <!-- <p class="card-description" >{{ task().description | stripHtml }}</p> -->

  <!-- 4. Due date -->

  <!-- 5. Tags -->
  <div class="tags d-flex flex-wrap gap-1 mt-1">
    @for (tag of task().tags; track tag) {
    <span class="tag">{{ tag }}</span>
    }
  </div>

  <!-- 6. Horizontal line -->
  <hr class="card-divider" />

  <!-- 7. Assignee avatar + name -->
  <div class="d-flex align-items-center justify-content-between ">
    <div class="assignee d-flex align-items-center gap-2" [class.not-found]="!task().assignee?.name">
      <div class="user-avatar">
        @if(task().assignee?.avatarUrl) {
        <img [src]="task().assignee?.avatarUrl" alt="">
        } @else {
        <img [src]="'icons/non-found-user-avatar.png'" alt="">
        }
      </div>

      <span class="assignee-name">{{ task().assignee?.name || 'Unassigned' }}</span>
    </div>
    <div class="due-date-badge d-flex align-items-center gap-1">
      <mat-icon class="icon-size-0-9">calendar_today</mat-icon>
      <span >{{ task().dueDate | date }}</span>
    </div>

  </div>

</div>
