<div class="users-page">
  <div class="page-header d-flex align-items-center justify-content-between">
    <h2 class="page-title">Team Members</h2>
    <button class="btn btn-primary" (click)="openAddUserDialog()">
      <span class="d-flex align-items-center justify-content-center gap-1">
        <mat-icon class="d-flex align-items-center justify-content-center mx-2"
          >person_add</mat-icon
        >
        Add User
      </span>
    </button>
  </div>

  @if (usersService.isLoading()) {
    <div class="users-grid">
      @for (n of [1, 2, 3, 4, 5, 6]; track n) {
        <div class="user-card skeleton"></div>
      }
    </div>
  } @else {
    <div class="users-grid">
      @for (user of usersService.users(); track user._id) {
        <div class="user-card">
          <button class="delete-btn" mat-icon-button (click)="deleteUser(user._id!)">
            <mat-icon>close</mat-icon>
          </button>
          <div class="user-avatar lg">{{ usersService.getAvatarInitials(user.name) }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-email">{{ user.email }}</span>
          </div>
        </div>
      }
    </div>
  }
</div>
