<mat-toolbar color="primary">
  @if (layoutService.isMobile()) {
    <button mat-icon-button (click)="layoutService.toggle()" aria-label="Toggle menu">
      <mat-icon>menu</mat-icon>
    </button>
  }

   <div class="page-title"> {{ layoutService.pageTitle() }} </div>

  <button
    class="d-flex align-items-center"
    mat-icon-button
    [matMenuTriggerFor]="userMenu"
    aria-label="User menu"
  >
    <div class="user-avatar">
      {{ usersService.getAvatarInitials(authService.currentUser()?.name ?? '') }}
    </div>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item (click)="authService.logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
