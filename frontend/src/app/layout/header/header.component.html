<mat-toolbar color="primary">
  @if (layoutService.isMobile()) {
    <button mat-icon-button (click)="layoutService.toggle()" aria-label="Toggle menu">
      <mat-icon>menu</mat-icon>
    </button>
  }

   <div class="page-title"> {{ layoutService.pageTitle() }} </div>

  <button
    class="d-flex align-items-center"
    mat-icon-button
    [matMenuTriggerFor]="userMenu"
    aria-label="User menu"
  >
    <div class="user-avatar">
        <img [src]="authService.currentUser()?.avatarUrl" alt="">
    </div>
  </button>
  <mat-menu #userMenu="matMenu">
    <!-- Disable closing the menu on click on header-->
    <div class="header-user-menu">
      <div class="header" (click)="$event.stopPropagation()">
        <div class="user-avatar lg p-1">
          <img [src]="authService.currentUser()?.avatarUrl" alt="">
        </div>
        <div class="info">
          <div class="name mb-1">{{ authService.currentUser()?.name }}</div>
          <div class="email">{{ authService.currentUser()?.email }}</div>
        </div>
      </div>
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person_outline</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item (click)="authService.logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </div>

  </mat-menu>
</mat-toolbar>
