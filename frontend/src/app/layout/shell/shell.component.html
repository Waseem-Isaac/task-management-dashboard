<app-header />

<mat-sidenav-container class="app-container">
  <mat-sidenav
    [mode]="layout.isMobile() ? 'over' : 'side'"
    [opened]="layout.isMobile() ? layout.sidenavOpen() : true"
    (openedChange)="layout.sidenavOpen.set($event)"
    class="app-sidenav"
  >
    <app-sidenav />
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="main-content">

      
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
