<mat-nav-list>
  <div class="logo-area">
    <div class="logo-sq">
      <img src="icons/logo.svg" alt="Logo">
    </div>
    <span class="logo-name">Task Manager</span>
  </div>
  <div class="nav-items">
    @for (item of navItems; track item.route) {
    <a class="nav-item" mat-list-item [routerLink]="item.route" routerLinkActive="active-nav-item"
      [routerLinkActiveOptions]="{ exact: true }" (click)="layout.isMobile() && layout.close()">
      <!-- <img [src]="item.iconPath" alt="{{ item.label }} icon" class="nav-icon"> -->
       <mat-icon class="nav-icon">{{ item.matIcon }}</mat-icon>
      {{ item.label }}
    </a>
    }
  </div>


  <div class="sidebar-footer">
    <button (click)="openAddTaskDialog()" class="m-4 btn-primary full-width" >
      <span class="d-flex align-items-center justify-content-center">
        <mat-icon class="d-flex align-items-center justify-content-center">add</mat-icon>
        New Task
      </span>
    </button>
  </div>

</mat-nav-list>
