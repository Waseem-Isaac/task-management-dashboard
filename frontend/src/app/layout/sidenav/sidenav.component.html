<mat-nav-list>
  @for (item of navItems; track item.route) {
    <a
      class="nav-item"
      mat-list-item
      [routerLink]="item.route"
      routerLinkActive="active-nav-item"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="layout.isMobile() && layout.close()"
    >
      {{ item.icon }}
      {{ item.label }}
    </a>
  }

  <button (click)="openAddTaskDialog()" class="m-4 nav-item btn-primary" mat-list-item mat-button>
    <span class="d-flex align-items-center justify-content-center">
      <mat-icon class="d-flex align-items-center justify-content-center">add</mat-icon>
      New Task
    </span>
  </button>
</mat-nav-list>
